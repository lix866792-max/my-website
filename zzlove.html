<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>粒子爱心</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: #0f0a1a;
            overflow: hidden;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100vw;
            height: 100vh;
        }
        .overlay {
            position: fixed;
            z-index: 2;
            left: 50%;
            top: 75%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: rgba(255, 192, 203, 0.95);
            width: 90%;
            max-width: 700px;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.6), 0 0 40px rgba(255, 105, 180, 0.3);
            animation: breathe 3.5s ease-in-out infinite;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        h1 {
            margin: 0 0 20px;
            font-size: 2.5em;
            letter-spacing: 8px;
            font-weight: 300;
            background: linear-gradient(90deg, #ff69b4, #ff1493, #ff69b4);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 4s linear infinite;
        }
        p {
            margin: 0;
            font-size: 1.15em;
            line-height: 2;
            white-space: pre-line;
            color: rgba(255, 223, 231, 0.92);
            text-shadow: 0 0 15px rgba(255, 182, 193, 0.5);
        }
        @keyframes breathe {
            0%,100%{opacity:.88;transform:translate(-50%,-50%) scale(1)}
            50%{opacity:1;transform:translate(-50%,-50%) scale(1.03)}
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <h1>亲爱的陈信菊：</h1>
        <p>遇见你，是我生命中最美好的意外。也许生活并不总是轰轰烈烈，但因为有你，每一个平凡的日子都变得格外温暖。</p>
    </div>
    <canvas id="cv"></canvas>
    <script>
        const cv = document.getElementById('cv');
        const ctx = cv.getContext('2d', { alpha: false });
        let W=0, H=0, particles=[], fallingParticles=[];
        const COUNT = 6000;
        const FALLING_COUNT = 150;
        
        function resize(){
            W = window.innerWidth;
            H = window.innerHeight;
            cv.width = W;
            cv.height = H;
        }
        window.addEventListener('resize', () => {
            resize();
            particles.forEach(p => p.reset());
            fallingParticles.forEach(p => p.reset());
        });
        resize();
        
        function heart(t){
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
            return { x, y };
        }
        
        class Particle {
            constructor(){ 
                this.reset(); 
            }
            reset(){
                this.t = Math.random() * Math.PI * 2;
                const h = heart(this.t);
                const scale = Math.min(W,H)/35;
                const r = Math.random();
                const len = r<0.3 ? Math.sqrt(Math.random())*0.8 : (r<0.9 ? Math.sqrt(Math.random()) : 1 + Math.random()*0.2);
                this.ox = h.x * scale * len;
                this.oy = h.y * scale * len;
                this.layer = len;
                this.size = Math.random()*2 + 0.5;
                this.h = 340 + Math.random()*20;
                this.s = 85 + Math.random()*15;
                this.l = 65 + Math.random()*15;
                
                const side = Math.floor(Math.random() * 4);
                switch(side) {
                    case 0: this.x = Math.random() * W * 2 - W/2; this.y = -H/2 - Math.random() * H; break;
                    case 1: this.x = W + W/2 + Math.random() * W; this.y = Math.random() * H * 2 - H/2; break;
                    case 2: this.x = Math.random() * W * 2 - W/2; this.y = H + H/2 + Math.random() * H; break;
                    case 3: this.x = -W/2 - Math.random() * W; this.y = Math.random() * H * 2 - H/2; break;
                }
            }
            update(bs){
                const s = 1 + (bs - 1) * this.layer;
                const tx = this.ox * s, ty = this.oy * s;
                this.x += (tx - this.x) * 0.03;
                this.y += (ty - this.y) * 0.03;
            }
            draw(){
                ctx.fillStyle = `hsl(${this.h}, ${this.s}%, ${this.l}%)`;
                ctx.beginPath();
                ctx.arc(W/2 + this.x, H/2 + this.y, this.size, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        class FallingParticle {
            constructor(){
                this.reset();
            }
            reset(){
                const scale = Math.min(W,H)/35;
                const t = Math.random() * Math.PI * 2;
                const h = heart(t);
                const r = Math.random();
                const len = r<0.3 ? Math.sqrt(Math.random())*0.8 : (r<0.9 ? Math.sqrt(Math.random()) : 1 + Math.random()*0.2);
                
                this.x = W/2 + h.x * scale * len + (Math.random()-0.5)*50;
                this.y = H/2 + h.y * scale * len + (Math.random()-0.5)*50;
                this.vx = (Math.random()-0.5)*0.8;
                this.vy = Math.random()*1.2 + 0.5;
                this.size = Math.random()*1.5 + 0.3;
                this.h = 340 + Math.random()*20;
                this.s = 85 + Math.random()*15;
                this.l = 65 + Math.random()*15;
                this.life = 1;
                this.phase = Math.random() * Math.PI * 2;
            }
            update(){
                this.phase += 0.05;
                this.x += this.vx + Math.sin(this.phase) * 0.4;
                this.y += this.vy;
                this.life -= 0.004;
                if(this.life <= 0 || this.y > H + 50){
                    this.reset();
                }
            }
            draw(){
                ctx.globalAlpha = this.life * 0.7;
                ctx.fillStyle = `hsl(${this.h}, ${this.s}%, ${this.l}%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        particles = Array.from({length: COUNT}, () => new Particle());
        fallingParticles = Array.from({length: FALLING_COUNT}, () => new FallingParticle());
        
        function loop(now){
            ctx.fillStyle = '#0f0a1a';
            ctx.fillRect(0,0,W,H);
            const t = now/1000;
            const h = (Math.sin(t*6) + 1.2*Math.sin(t*6 + Math.PI/3) * Math.pow(Math.sin(t*6),2)) * 0.03;
            const bs = 1 + h;
            
            particles.forEach(p => { 
                p.update(bs); 
                p.draw(); 
            });
            
            fallingParticles.forEach(p => {
                p.update();
                p.draw();
            });
            
            requestAnimationFrame(loop);
        }
        
        requestAnimationFrame(loop);
    </script>
</body>
</html>
